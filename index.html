<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山口の要塞 - Switch Music</title>
    <style>
        body { background-color: #1a1a1a; color: #00ffcc; text-align: center; font-family: sans-serif; padding: 20px; }
        .fortress-card { border: 3px solid #00ffcc; padding: 20px; border-radius: 15px; background: #333; }
        button { 
            background: #00ffcc; color: #000; border: none; padding: 15px 30px; 
            margin: 10px; font-size: 1.2rem; font-weight: bold; border-radius: 10px; width: 80%;
        }
        button:active { background: #ff00ff; color: #fff; }
    </style>
</head>
<body>
    <div class="fortress-card">
        <h1>🏰 山口の要塞 🏰</h1>
        <p>スイッチ対応版プレイヤー</p>
        <button onclick="new Audio('https://maoudamashii.jokersounds.com/music/song/mp3/song_shi_shining_star.mp3').play()">🎵 シャイニングスター</button>
        <button onclick="new Audio('https://maoudamashii.jokersounds.com/music/song/mp3/song_shi_bokuramata.mp3').play()">🎵 僕らまた</button>
        <p>ボタンを押して再生！</p>
    </div>
</body>
</html>
