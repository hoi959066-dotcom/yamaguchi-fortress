<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAMAGUCHI FORTRESS V7 - MULTI SEARCH</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --card: #1a1a1a; }
        body { background: var(--bg); color: var(--neon); font-family: monospace; padding: 10px; margin: 0; }
        .card { background: var(--card); border: 1px solid var(--neon); padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        h2 { font-size: 0.9rem; margin-bottom: 8px; color: #fff; text-transform: uppercase; }
        input { background: #000; color: var(--neon); border: 1px solid var(--neon); width: 92%; padding: 15px; font-size: 1.2rem; margin-bottom: 10px; }
        
        .search-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        button { background: #222; color: var(--neon); border: 1px solid var(--neon); padding: 12px; border-radius: 5px; font-weight: bold; font-size: 0.9rem; width: 100%; }
        button:active { background: var(--neon); color: #000; }
        
        /* 検索エンジンごとの色分け */
        .g-btn { border-left: 5px solid #4285F4; } /* Google */
        .b-btn { border-left: 5px solid #00a1f1; } /* Bing */
        .d-btn { border-left: 5px solid #de5833; } /* DuckDuckGo */
        .p-btn { border-left: 5px solid #bd081c; } /* Pinterest */
        
        #history-list { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
        .hist-item { background: #003300; font-size: 0.8rem; padding: 8px; width: auto; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🛠️ 統合検索指令室 (V7)</h2>
        <input type="text" id="q" placeholder="キーワードを入力...">
        
        <div class="search-grid">
            <button class="g-btn" onclick="go('https://google.com/search?q=')">🌐 Google検索</button>
            <button class="g-btn" onclick="go('https://google.com/search?tbm=isch&q=')">🖼️ Google画像</button>
            <button class="b-btn" onclick="go('https://www.bing.com/search?q=')">🔍 Bing検索</button>
            <button class="b-btn" onclick="go('https://www.bing.com/images/search?q=')">🎨 Bing画像</button>
            <button class="d-btn" onclick="go('https://duckduckgo.com/?q=')">🐤 DDG検索</button>
            <button class="p-btn" onclick="go('https://www.pinterest.jp/search/pins/?q=')">📌 Pinterest</button>
        </div>
        
        <button onclick="document.getElementById('q').value=''" style="width:100%; margin-top:10px; background:#444; border:none;">❌ 入力クリア</button>
    </div>

    <div class="card">
        <h2>📜 保存された検索履歴</h2>
        <div id="history-list"></div>
    </div>

    <script>
        const input = document.getElementById('q');
        const histDiv = document.getElementById('history-list');

        function go(url) {
            const val = input.value.trim();
            if(!val) return;
            save(val);
            location.href = url + encodeURIComponent(val);
        }

        function save(val) {
            let h = JSON.parse(localStorage.getItem('v7_hist') || "[]");
            h = [val, ...h.filter(x => x !== val)].slice(0, 10);
            localStorage.setItem('v7_hist', JSON.stringify(h));
        }

        function render() {
            const h = JSON.parse(localStorage.getItem('v7_hist') || "[]");
            histDiv.innerHTML = h.map(x => `<button class="hist-item" onclick="document.getElementById('q').value='${x}'">${x}</button>`).join("");
        }
        render();
    </script>
</body>
</html>
